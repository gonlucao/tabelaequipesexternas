<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Monitoramento - Metas equipes externa</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Inter';
  background:#f5f7fb;
  padding:20px;
}

.container {
  max-width:1200px;
  margin:auto;
}

/* TOPO */
.topbar {
  background: linear-gradient(90deg,#b91c1c,#dc2626);
  padding: 15px 20px;
  border-radius: 12px;
  color: white;
}

.topbar-content {
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo {
  height: 45px;
  background: white;
  padding: 4px;
  border-radius: 6px;
}

/* CARD */
.card {
  background:white;
  padding:20px;
  border-radius:16px;
  margin-top:20px;
}

/* TABELA */
table {
  width:100%;
  border-collapse:collapse;
}

th,td {
  padding:10px;
  border-bottom:1px solid #eee;
  text-align:center;
}

th:first-child,td:first-child {
  text-align:left;
}

.meta-ok{color:green;}
.meta-bad{color:red;}

.circulo{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  width:30px;
  height:30px;
  border-radius:50%;
  font-size:10px;
  color:white;
  margin-right:3px;
}

.verde{background:#16a34a;}
.vermelho{background:#dc2626;}

.btn-sort {
  cursor:pointer;
  margin-left:5px;
}

.btn-filtro {
  background:#dc2626;
  color:white;
  border:none;
  padding:6px 12px;
  border-radius:8px;
  font-weight:600;
  cursor:pointer;
}

.btn-filtro:hover {
  background:#b91c1c;
}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#0005;
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:white;
  border-radius:12px;
  width:300px;
  max-height:400px;
  display:flex;
  flex-direction:column;
}

.modal-header{
  position:sticky;
  top:0;
  background:white;
  padding:10px;
  border-bottom:1px solid #eee;
  display:flex;
  justify-content:space-between;
}

.lista-scroll{
  overflow-y:auto;
  padding:10px;
}

.btn-aplicar {
  background:#16a34a;
  color:white;
  border:none;
  padding:6px 10px;
  border-radius:6px;
}

.btn-limpar {
  background:#dc2626;
  color:white;
  border:none;
  padding:6px 10px;
  border-radius:6px;
}
</style>
</head>

<body>

<div class="container">

<div class="topbar">
  <div class="topbar-content">
    <!-- ✅ LOGO FUNCIONANDO -->
    <img src="https://i.ibb.co/rjpBZ8P/Logo-RBT-Perfil.jpg" class="logo">
    <span>Monitoramento - Metas equipes externa</span>
  </div>
</div>

<div class="card">
<table id="tabela">
<thead>
<tr>
<th>Técnico <button class="btn-filtro" onclick="abrirFiltro()">🔍 Filtrar</button></th>
<th>Jan <button class="btn-sort" onclick="ordenarMes(0)">⇅</button></th>
<th>Fev <button class="btn-sort" onclick="ordenarMes(1)">⇅</button></th>
<th>Mar <button class="btn-sort" onclick="ordenarMes(2)">⇅</button></th>
<th>Média <button class="btn-sort" onclick="ordenarMedia()">⇅</button></th>
<th>Status <button class="btn-sort" onclick="ordenarStatus()">⇅</button></th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

</div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-content">
    
    <div class="modal-header">
      <button class="btn-aplicar" onclick="aplicarFiltro()">Aplicar</button>
      <button class="btn-limpar" onclick="limparFiltro()">Limpar</button>
    </div>

    <div id="lista" class="lista-scroll"></div>

  </div>
</div>

<script>
let dadosTecnicos = {};
let listaOrdenada = [];
let nomesFiltrados = [];
let direcao = "desc";

const abas = [
  "1836732217",
  "576248296",
  "1758926410"
];

async function carregarMes(gid){
  const url = `https://docs.google.com/spreadsheets/d/1KAmeD9jbBX8JssWWeWG3kR03J4zVEjQDx--ojQIFSmg/gviz/tq?tqx=out:json&gid=${gid}`;
  const res = await fetch(url);
  const text = await res.text();
  const json = JSON.parse(text.substr(47).slice(0,-2));
  return json.table.rows;
}

async function carregarDados(){
  dadosTecnicos = {};

  for(let i=0;i<abas.length;i++){
    let rows = await carregarMes(abas[i]);

    rows.forEach((r,index)=>{
      if(index===0) return;

      let nome = r.c[0]?.v;
      let total = Number(r.c[19]?.v)||0;

      if(!nome) return;

      if(!dadosTecnicos[nome]){
        dadosTecnicos[nome]=[0,0,0];
      }

      dadosTecnicos[nome][i]=total;
    });
  }

  render();
}

function media(a){ return a.reduce((x,y)=>x+y,0)/a.length; }
function metas(a){ return a.filter(v=>v>=170).length; }

function render(){
  let tbody=document.querySelector("tbody");
  tbody.innerHTML="";

  Object.keys(dadosTecnicos).forEach(nome=>{
    let v=dadosTecnicos[nome];
    let m=media(v);

    if(m<50) return;
    if(nomesFiltrados.length && !nomesFiltrados.includes(nome)) return;

    let linha=`<tr><td><strong>${nome}</strong></td>`;

    v.forEach(x=>{
      linha+=`<td class="${x>=170?'meta-ok':'meta-bad'}">${x}</td>`;
    });

    linha+=`<td>${m.toFixed(1)}</td>`;

    let s="";
    ["JAN","FEV","MAR"].forEach((mes,i)=>{
      s+=`<span class="circulo ${v[i]>=170?'verde':'vermelho'}">${mes}</span>`;
    });

    linha+=`<td>${s}</td></tr>`;
    tbody.innerHTML+=linha;
  });
}

function ordenarMes(i){
  direcao = direcao==="desc"?"asc":"desc";

  listaOrdenada = Object.keys(dadosTecnicos).map(n=>{
    let v=dadosTecnicos[n];
    return {n,v,m:media(v),k:metas(v)};
  });

  listaOrdenada.sort((a,b)=>direcao==="asc"?a.v[i]-b.v[i]:b.v[i]-a.v[i]);
  renderOrdenado();
}

function ordenarMedia(){
  direcao = direcao==="desc"?"asc":"desc";

  listaOrdenada = Object.keys(dadosTecnicos).map(n=>{
    let v=dadosTecnicos[n];
    return {n,v,m:media(v),k:metas(v)};
  });

  listaOrdenada.sort((a,b)=>direcao==="asc"?a.m-b.m:b.m-a.m);
  renderOrdenado();
}

function ordenarStatus(){
  direcao = direcao==="desc"?"asc":"desc";

  listaOrdenada = Object.keys(dadosTecnicos).map(n=>{
    let v=dadosTecnicos[n];
    return {n,v,m:media(v),k:metas(v)};
  });

  listaOrdenada.sort((a,b)=>direcao==="asc"?a.k-b.k:b.k-a.k);
  renderOrdenado();
}

function renderOrdenado(){
  let tbody=document.querySelector("tbody");
  tbody.innerHTML="";

  listaOrdenada.forEach(o=>{
    if(o.m<50) return;
    if(nomesFiltrados.length && !nomesFiltrados.includes(o.n)) return;

    let linha=`<tr><td><strong>${o.n}</strong></td>`;

    o.v.forEach(x=>{
      linha+=`<td class="${x>=170?'meta-ok':'meta-bad'}">${x}</td>`;
    });

    linha+=`<td>${o.m.toFixed(1)}</td>`;

    let s="";
    ["JAN","FEV","MAR"].forEach((mes,i)=>{
      s+=`<span class="circulo ${o.v[i]>=170?'verde':'vermelho'}">${mes}</span>`;
    });

    linha+=`<td>${s}</td></tr>`;
    tbody.innerHTML+=linha;
  });
}

function abrirFiltro(){
  let lista=document.getElementById("lista");
  lista.innerHTML="";

  Object.keys(dadosTecnicos).forEach(n=>{
    lista.innerHTML+=`<div><input type="checkbox" value="${n}"> ${n}</div>`;
  });

  document.getElementById("modal").style.display="flex";
}

function aplicarFiltro(){
  let c=document.querySelectorAll("#lista input:checked");
  nomesFiltrados=[...c].map(x=>x.value);
  document.getElementById("modal").style.display="none";
  render();
}

function limparFiltro(){
  nomesFiltrados=[];
  document.getElementById("modal").style.display="none";
  render();
}

carregarDados();
</script>

</body>
</html>

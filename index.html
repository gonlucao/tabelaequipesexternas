<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Monitoramento - Metas equipes externa</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Inter';
  background:#f5f7fb;
  padding:20px;
}

/* LOGIN */
.login-overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:#00000090;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:999;
}

.login-box{
  background:white;
  padding:30px 25px;
  border-radius:14px;
  width:320px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.login-box input{
  width:100%;
  padding:12px;
  margin-top:12px;
  border-radius:10px;
  border:1px solid #ccc;
  box-sizing:border-box;
}

.login-box button{
  width:100%;
  padding:12px;
  margin-top:12px;
  border-radius:10px;
  border:none;
  background:#dc2626;
  color:white;
  font-weight:600;
  cursor:pointer;
}

/* USER BAR */
.user-bar{
  display:flex;
  justify-content:flex-end;
  gap:10px;
  margin-bottom:10px;
}

.user-bar button{
  background:#dc2626;
  color:white;
  border:none;
  padding:6px 10px;
  border-radius:6px;
  cursor:pointer;
}

.container { max-width:1200px; margin:auto; }

/* MENU */
.menu { display:flex; gap:10px; margin-bottom:15px; }

.menu button{
  padding:10px 18px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:#e5e7eb;
  font-weight:600;
}

.menu button.ativo{
  background:#dc2626;
  color:white;
}

/* PAGINAS */
.pagina { display:none; }
.pagina.ativa { display:block; }

.topbar {
  background: linear-gradient(90deg,#b91c1c,#dc2626);
  padding:15px;
  border-radius:12px;
  color:white;
}

.topbar-content {
  display:flex;
  align-items:center;
  gap:12px;
}

.logo { height:45px; }

/* KPIs */
.cards {
  display:grid;
  grid-template-columns: repeat(3,1fr);
  gap:15px;
  margin-top:20px;
}

.card-kpi {
  background:white;
  padding:20px;
  border-radius:12px;
  text-align:center;
}

.card-kpi span {
  font-size:32px;
  font-weight:bold;
}

/* TABLE */
.card {
  background:white;
  padding:20px;
  border-radius:16px;
  margin-top:20px;
}

table { width:100%; border-collapse:collapse; }

th,td {
  padding:10px;
  border-bottom:1px solid #eee;
  text-align:center;
}

th:first-child,td:first-child { text-align:left; }
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login-overlay" id="loginBox">
  <div class="login-box">
    <h3>Login</h3>

    <input type="text" id="user" placeholder="Usuário">
    <input type="password" id="pass" placeholder="Senha">

    <button onclick="login()">Entrar</button>

    <p id="erro" style="color:red;font-size:12px;"></p>
  </div>
</div>

<div class="container">

<div class="user-bar">
  <span id="usuarioLogado"></span>
  <button onclick="logout()">Sair</button>
</div>

<div class="menu" id="menu">
  <button onclick="trocarPagina(0)">Dashboard</button>
  <button onclick="trocarPagina(1)">Metas equipes</button>
</div>

<div class="pagina ativa" id="p1">

<div class="topbar">
  <div class="topbar-content">
    <img src="https://i.ibb.co/rjpBZ8P/Logo-RBT-Perfil.jpg" class="logo">
    <span>Monitoramento - Metas equipes externa</span>
  </div>
</div>

<div class="card">
  <h3>Dashboard carregado</h3>
</div>

</div>

<div class="pagina" id="p2">
  <div class="card">
    <h2>Metas equipes</h2>
  </div>
</div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbydC82xbEs7KD4MZcwxyxXX6ahBJKWN9QYKqZ_DV_OZH96EsG1JyyomJNjd3GpwWe2N/exec";

window.onload = () => {
  let logado = JSON.parse(localStorage.getItem("logado"));
  if(logado){
    aplicarLogin(logado);
  } else {
    mostrarPagina(0);
  }
};

async function login(){

  let u = document.getElementById("user").value;
  let p = document.getElementById("pass").value;

  try{
    let res = await fetch(`${API_URL}?user=${u}&pass=${p}`);
    let data = await res.json();

    if(data.status){
      localStorage.setItem("logado", JSON.stringify(data));
      aplicarLogin(data);
    }else{
      erro("Login inválido");
    }

  }catch(e){
    erro("Erro de conexão");
  }
}

function aplicarLogin(user){
  document.getElementById("loginBox").style.display="none";
  document.getElementById("usuarioLogado").innerText =
    `👤 ${user.nome} (${user.perfil})`;

  mostrarPagina(0);
}

function logout(){
  localStorage.removeItem("logado");
  location.reload();
}

function erro(msg){
  document.getElementById("erro").innerText = msg;
}

function trocarPagina(i){
  mostrarPagina(i);
}

function mostrarPagina(i){
  document.querySelectorAll(".pagina").forEach((p,index)=>{
    p.classList.toggle("ativa", index===i);
  });

  document.querySelectorAll("#menu button").forEach((b,index)=>{
    b.classList.toggle("ativo", index===i);
  });
}

</script>

</body>
</html>

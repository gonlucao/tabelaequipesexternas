<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Monitoramento - Metas equipes externa</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Inter';
  background:#f5f7fb;
  padding:20px;
}

.container { max-width:1200px; margin:auto; }

.topbar {
  background: linear-gradient(90deg,#b91c1c,#dc2626);
  padding: 15px 20px;
  border-radius: 12px;
  color: white;
}

.topbar-content {
  display:flex;
  align-items:center;
  gap:12px;
}

.logo { height:45px; }

/* KPIs */
.cards {
  display:grid;
  grid-template-columns: repeat(3,1fr);
  gap:15px;
  margin-top:20px;
}

.card-kpi {
  background:white;
  padding:20px;
  border-radius:12px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  box-shadow:0 4px 10px #0001;
}

.card-kpi span {
  font-size:32px;
  font-weight:bold;
}

/* 🔥 SUBCARDS */
.meta-grid {
  display:grid;
  grid-template-columns: repeat(3,1fr);
  gap:10px;
  width:100%;
  margin-top:10px;
}

.meta-box {
  border-radius:10px;
  padding:10px;
  text-align:center;
  color:white;
}

.meta-box strong {
  display:block;
  font-size:20px;
}

.meta-box span {
  font-size:12px;
}

/* CORES */
.meta3 { background:#16a34a; } /* verde */
.meta2 { background:#f59e0b; } /* amarelo */
.meta1 { background:#dc2626; } /* vermelho */

/* TOP 3 */
.top3 { display:flex; gap:15px; margin-top:20px; }

.top3-card {
  flex:1;
  background:white;
  padding:15px;
  border-radius:12px;
  text-align:center;
  box-shadow:0 4px 10px #0001;
}

.gold { border-top:5px solid #facc15; }
.silver { border-top:5px solid #9ca3af; }
.bronze { border-top:5px solid #b45309; }

/* TABELA */
.card {
  background:white;
  padding:20px;
  border-radius:16px;
  margin-top:20px;
}

table { width:100%; border-collapse:collapse; }

th,td {
  padding:10px;
  border-bottom:1px solid #eee;
  text-align:center;
}

th:first-child,td:first-child { text-align:left; }

tr:hover { background:#f9fafb; }

.meta-ok{color:#16a34a;font-weight:bold;}
.meta-bad{color:#dc2626;}

.circulo{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  width:28px;
  height:28px;
  border-radius:50%;
  font-size:9px;
  color:white;
  margin-right:3px;
}

.verde{background:#16a34a;}
.vermelho{background:#dc2626;}

.btn-sort { cursor:pointer; margin-left:5px; }

.btn-filtro {
  background:#dc2626;
  color:white;
  border:none;
  padding:6px 12px;
  border-radius:8px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<div class="topbar">
  <div class="topbar-content">
    <img src="https://i.ibb.co/rjpBZ8P/Logo-RBT-Perfil.jpg" class="logo">
    <span>Monitoramento - Metas equipes externa</span>
  </div>
</div>

<!-- KPIs -->
<div class="cards">
  <div class="card-kpi">
    <h3>Total Técnicos</h3>
    <span id="totalTec">0</span>
  </div>

  <div class="card-kpi">
    <h3>Média Geral</h3>
    <span id="mediaGeral">0</span>
  </div>

  <div class="card-kpi">
    <h3>Consistência de Metas</h3>

    <div class="meta-grid">
      <div class="meta-box meta3">
        <strong id="meta3">0%</strong>
        <span>3/3 meses</span>
      </div>

      <div class="meta-box meta2">
        <strong id="meta2">0%</strong>
        <span>2/3 meses</span>
      </div>

      <div class="meta-box meta1">
        <strong id="meta1">0%</strong>
        <span>1/3 meses</span>
      </div>
    </div>

  </div>
</div>

<!-- TOP 3 -->
<div class="top3" id="top3"></div>

<div class="card">
<table>
<thead>
<tr>
<th>Técnico <button class="btn-filtro" onclick="abrirFiltro()">Filtrar</button></th>
<th>Jan <span class="btn-sort" onclick="ordenarMes(0)">⇅</span></th>
<th>Fev <span class="btn-sort" onclick="ordenarMes(1)">⇅</span></th>
<th>Mar <span class="btn-sort" onclick="ordenarMes(2)">⇅</span></th>
<th>Média <span class="btn-sort" onclick="ordenarMedia()">⇅</span></th>
<th>Status <span class="btn-sort" onclick="ordenarStatus()">⇅</span></th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>

</div>

<script>
let dadosTecnicos = {};
let direcao = "desc";

const abas = ["1836732217","576248296","1758926410"];

async function carregarMes(gid){
  const url = `https://docs.google.com/spreadsheets/d/1KAmeD9jbBX8JssWWeWG3kR03J4zVEjQDx--ojQIFSmg/gviz/tq?tqx=out:json&gid=${gid}`;
  const res = await fetch(url);
  const text = await res.text();
  const json = JSON.parse(text.substr(47).slice(0,-2));
  return json.table.rows;
}

async function carregarDados(){
  for(let i=0;i<abas.length;i++){
    let rows = await carregarMes(abas[i]);

    rows.forEach((r,index)=>{
      if(index===0) return;
      let nome = r.c[0]?.v;
      let total = Number(r.c[19]?.v)||0;

      if(!dadosTecnicos[nome]) dadosTecnicos[nome]=[0,0,0];
      dadosTecnicos[nome][i]=total;
    });
  }
  render();
}

function media(a){ return a.reduce((x,y)=>x+y,0)/a.length; }
function metas(a){ return a.filter(v=>v>=170).length; }

function getLista(){
  return Object.keys(dadosTecnicos).map(n=>{
    let v=dadosTecnicos[n];
    return {n,v,m:media(v),k:metas(v)};
  }).filter(x=>x.m>=50);
}

function render(){
  let dados = getLista();

  document.getElementById("totalTec").innerText = dados.length;
  document.getElementById("mediaGeral").innerText =
    (dados.reduce((s,x)=>s+x.m,0)/dados.length).toFixed(1);

  let total = dados.length;
  document.getElementById("meta3").innerText =
    Math.round((dados.filter(x=>x.k===3).length/total)*100)+"%";
  document.getElementById("meta2").innerText =
    Math.round((dados.filter(x=>x.k===2).length/total)*100)+"%";
  document.getElementById("meta1").innerText =
    Math.round((dados.filter(x=>x.k===1).length/total)*100)+"%";
}

carregarDados();
</script>

</body>
</html>

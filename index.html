<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Monitoramento - Metas equipes externa</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
/* ================= LOGIN ================= */
.login-overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:#00000090;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:999;
}

.login-box{
  background:white;
  padding:25px;
  border-radius:12px;
  width:320px;
  text-align:center;
}

.input-padrao{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:1px solid #ccc;
}

.btn-padrao{
  width:100%;
  padding:10px;
  margin-top:10px;
  background:#dc2626;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.cadastro{ display:none; }

/* ================= SUA DASH ORIGINAL ================= */
body {
  font-family: 'Inter';
  background:#f5f7fb;
  padding:20px;
}

.container { max-width:1200px; margin:auto; }

.topbar {
  background: linear-gradient(90deg,#b91c1c,#dc2626);
  padding:15px;
  border-radius:12px;
  color:white;
}

.topbar-content {
  display:flex;
  align-items:center;
  gap:12px;
}

.logo { height:45px; }

.cards {
  display:grid;
  grid-template-columns: repeat(3,1fr);
  gap:15px;
  margin-top:20px;
}

.card-kpi {
  background:white;
  padding:20px;
  border-radius:12px;
  text-align:center;
  box-shadow:0 4px 10px #0001;
}

.card-kpi span {
  font-size:32px;
  font-weight:bold;
}

.meta-grid {
  display:grid;
  grid-template-columns: repeat(3,1fr);
  gap:12px;
  margin-top:12px;
}

.meta-box {
  padding:18px;
  border-radius:14px;
  color:white;
  text-align:center;
}

.meta3 { background:#16a34a; }
.meta2 { background:#f59e0b; }
.meta1 { background:#dc2626; }

.top3 { display:flex; gap:15px; margin-top:20px; }

.top3-card {
  flex:1;
  background:white;
  padding:15px;
  border-radius:12px;
  text-align:center;
}

.card {
  background:white;
  padding:20px;
  border-radius:16px;
  margin-top:20px;
}

table { width:100%; border-collapse:collapse; }

th,td {
  padding:10px;
  border-bottom:1px solid #eee;
  text-align:center;
}

th:first-child,td:first-child { text-align:left; }

.meta-ok{color:#16a34a;font-weight:bold;}
.meta-bad{color:#dc2626;}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login-overlay" id="loginBox">
  <div class="login-box">
    <h3>Login</h3>

    <input class="input-padrao" id="user" placeholder="Usuário">
    <input class="input-padrao" id="pass" type="password" placeholder="Senha">

    <button class="btn-padrao" onclick="login()">Entrar</button>

    <p id="erro" style="color:red;"></p>
  </div>
</div>

<!-- DASH ORIGINAL (NÃO ALTERADA) -->
<div class="container" id="dashboard" style="display:none;">

<div class="topbar">
  <div class="topbar-content">
    <span>Monitoramento - Metas equipes externa</span>
  </div>
</div>

<div class="cards">
  <div class="card-kpi">
    <h3>Total Técnicos</h3>
    <span id="totalTec">0</span>
  </div>

  <div class="card-kpi">
    <h3>Média Geral</h3>
    <span id="mediaGeral">0</span>
  </div>

  <div class="card-kpi">
    <h3>Consistência</h3>
    <div class="meta-grid">
      <div class="meta-box meta3"><strong id="meta3">0%</strong></div>
      <div class="meta-box meta2"><strong id="meta2">0%</strong></div>
      <div class="meta-box meta1"><strong id="meta1">0%</strong></div>
    </div>
  </div>
</div>

<div class="top3" id="top3"></div>

<div class="card">
<table>
<thead>
<tr>
<th>Técnico</th>
<th>Jan</th>
<th>Fev</th>
<th>Mar</th>
<th>Média</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>

</div>

<script>

/* ================= LOGIN ================= */
const API_URL = "https://script.google.com/macros/s/AKfycbydC82xbEs7KD4MZcwxyxXX6ahBJKWN9QYKqZ_DV_OZH96EsG1JyyomJNjd3GpwWe2N/exec";

async function login(){
  let u = user.value;
  let p = pass.value;

  let res = await fetch(`${API_URL}?user=${u}&pass=${p}`);
  let data = await res.json();

  if(data.status){
    loginBox.style.display="none";
    dashboard.style.display="block";
    carregarDados();
  }else{
    erro("Login inválido");
  }
}

function erro(msg){
  document.getElementById("erro").innerText = msg;
}

/* ================= DASH ORIGINAL ================= */
let dadosTecnicos = {};
let lista = [];

const abas = ["1836732217","576248296","1758926410"];

async function carregarMes(gid){
  const url = `https://docs.google.com/spreadsheets/d/1KAmeD9jbBX8JssWWeWG3kR03J4zVEjQDx--ojQIFSmg/gviz/tq?tqx=out:json&gid=${gid}`;
  const res = await fetch(url);
  const text = await res.text();
  const json = JSON.parse(text.substring(text.indexOf("{"), text.lastIndexOf("}")+1));
  return json.table.rows;
}

async function carregarDados(){
  for(let i=0;i<abas.length;i++){
    let rows = await carregarMes(abas[i]);

    rows.forEach((r,index)=>{
      if(index===0) return;

      let nome = r.c[0]?.v;
      let total = Number(r.c[19]?.v)||0;

      if(!dadosTecnicos[nome]) dadosTecnicos[nome]=[0,0,0];
      dadosTecnicos[nome][i]=total;
    });
  }

  lista = Object.keys(dadosTecnicos).map(n=>{
    let v = dadosTecnicos[n];
    return {n,v,m:v.reduce((a,b)=>a+b,0)/3};
  });

  render();
}

function render(){
  totalTec.innerText = lista.length;
  mediaGeral.innerText =
    (lista.reduce((s,x)=>s+x.m,0)/lista.length).toFixed(1);
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Monitoramento - Metas equipes externa</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Inter';
  background:#f5f7fb;
  padding:20px;
}

/* LOGIN */
.login-overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:#00000090;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:999;
}

.login-box{
  background:white;
  padding:25px;
  border-radius:12px;
  width:300px;
  text-align:center;
}

.login-box input, .login-box select{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:1px solid #ccc;
}

.login-box button{
  margin-top:10px;
  width:100%;
  padding:10px;
  background:#dc2626;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

/* USER BAR */
.user-bar{
  display:flex;
  justify-content:flex-end;
  gap:10px;
  margin-bottom:10px;
}

.user-bar button{
  background:#dc2626;
  color:white;
  border:none;
  padding:6px 10px;
  border-radius:6px;
  cursor:pointer;
}

.container { max-width:1200px; margin:auto; }

/* MENU */
.menu { display:flex; gap:10px; margin-bottom:15px; }

.menu button{
  padding:10px 18px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:#e5e7eb;
  font-weight:600;
}

.menu button.ativo{
  background:#dc2626;
  color:white;
}

/* PAGINAS */
.pagina { display:none; }
.pagina.ativa { display:block; }

.topbar {
  background: linear-gradient(90deg,#b91c1c,#dc2626);
  padding:15px;
  border-radius:12px;
  color:white;
}

.cards {
  display:grid;
  grid-template-columns: repeat(3,1fr);
  gap:15px;
  margin-top:20px;
}

.card-kpi {
  background:white;
  padding:20px;
  border-radius:12px;
  text-align:center;
  box-shadow:0 4px 10px #0001;
}

.card {
  background:white;
  padding:20px;
  border-radius:16px;
  margin-top:20px;
}

table { width:100%; border-collapse:collapse; }
th,td { padding:10px; border-bottom:1px solid #eee; text-align:center; }
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login-overlay" id="loginBox">
  <div class="login-box">
    <h3>Login</h3>

    <input type="text" id="user" placeholder="Usuário">
    <input type="password" id="pass" placeholder="Senha">

    <button onclick="login()">Entrar</button>

    <hr>

    <h4>Cadastrar</h4>

    <input type="text" id="newUser" placeholder="Novo usuário">
    <input type="password" id="newPass" placeholder="Senha">

    <select id="perfil">
      <option value="supervisor">Supervisor</option>
      <option value="equipe">Equipe</option>
    </select>

    <button onclick="cadastrar()">Cadastrar</button>

    <p id="erro" style="color:red;font-size:12px;"></p>
  </div>
</div>

<div class="container">

<!-- USER -->
<div class="user-bar">
  <span id="usuarioLogado"></span>
  <button onclick="logout()">Sair</button>
</div>

<!-- MENU -->
<div class="menu" id="menu">
  <button onclick="trocarPagina(0)">Dashboard</button>
  <button onclick="trocarPagina(1)">Metas equipes</button>
</div>

<!-- PAGINAS -->
<div class="pagina" id="p1">
  <div class="topbar">Dashboard</div>
  <div class="card">Conteúdo completo do dashboard aqui</div>
</div>

<div class="pagina" id="p2">
  <div class="topbar">Metas equipes</div>
  <div class="card">Conteúdo para equipes externas</div>
</div>

</div>

<script>

/* USUARIOS */
let usuarios = JSON.parse(localStorage.getItem("usuarios")) || {
  "admin": {senha:"123",perfil:"supervisor"}
};

/* LOGIN AUTOMATICO */
window.onload = () => {
  let logado = JSON.parse(localStorage.getItem("logado"));
  if(logado){
    aplicarLogin(logado);
  }
};

/* LOGIN */
function login(){
  let u=document.getElementById("user").value;
  let p=document.getElementById("pass").value;

  if(usuarios[u] && usuarios[u].senha === p){
    let userData = {nome:u,perfil:usuarios[u].perfil};
    localStorage.setItem("logado", JSON.stringify(userData));
    aplicarLogin(userData);
  }else{
    erro("Login inválido");
  }
}

/* CADASTRO */
function cadastrar(){
  let u=document.getElementById("newUser").value;
  let p=document.getElementById("newPass").value;
  let perfil=document.getElementById("perfil").value;

  if(!u || !p) return erro("Preencha tudo");

  usuarios[u] = {senha:p,perfil};
  localStorage.setItem("usuarios", JSON.stringify(usuarios));

  erro("Usuário criado!");
}

/* APLICAR LOGIN */
function aplicarLogin(user){
  document.getElementById("loginBox").style.display="none";
  document.getElementById("usuarioLogado").innerText = `👤 ${user.nome} (${user.perfil})`;

  controlarAcesso(user.perfil);
}

/* CONTROLE DE ACESSO */
function controlarAcesso(perfil){

  if(perfil === "supervisor"){
    mostrarPagina(0);
  }else{
    mostrarPagina(1);
    document.querySelectorAll("#menu button")[0].style.display="none";
  }
}

/* TROCA DE PAGINA */
function trocarPagina(i){
  mostrarPagina(i);
}

function mostrarPagina(i){
  document.querySelectorAll(".pagina").forEach((p,index)=>{
    p.classList.toggle("ativa", index===i);
  });

  document.querySelectorAll("#menu button").forEach((b,index)=>{
    b.classList.toggle("ativo", index===i);
  });
}

/* LOGOUT */
function logout(){
  localStorage.removeItem("logado");
  location.reload();
}

/* ERRO */
function erro(msg){
  document.getElementById("erro").innerText = msg;
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Monitoramento - Metas equipes externa</title>

  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #f5f7fb;
      margin: 0;
      padding: 20px;
      color: #333;
    }

    .topbar {
      background: linear-gradient(90deg, #b91c1c, #dc2626);
      padding: 25px 20px;
      border-radius: 12px;
      margin-bottom: 20px;
    }

    .topbar-content {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .logo {
      height: 60px;
      object-fit: contain;
      border-radius: 8px;
    }

    .titulo {
      color: white;
      font-size: 24px;
      font-weight: 700;
    }

    .container {
      max-width: 1200px;
      margin: auto;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 16px;
      margin-top: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid #eee;
      text-align: center;
    }

    th:first-child, td:first-child {
      text-align: left;
    }

    .meta-ok { color: green; }
    .meta-bad { color: red; }

    .circulo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      font-size: 11px;
      font-weight: 700;
      margin-right: 5px;
      color: white;
    }

    .verde { background: #16a34a; }
    .vermelho { background: #dc2626; }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.4);
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background: white;
      padding: 20px;
      border-radius: 12px;
      width: 300px;
      display: flex;
      flex-direction: column;
      max-height: 400px;
    }

    #listaNomes {
      overflow-y: auto;
      margin-top: 10px;
      padding-right: 5px;
    }

    .btn {
      margin-top: 10px;
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .btn-aplicar { background: #16a34a; color: white; }
    .btn-limpar { background: #dc2626; color: white; }

    .th-mes {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .btn-sort {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: none;
      background: #e5e7eb;
      cursor: pointer;
      font-size: 12px;
      font-weight: bold;
    }

    .btn-sort:hover {
      background: #dc2626;
      color: white;
    }
  </style>
</head>

<body>
<div class="container">

  <div class="topbar">
    <div class="topbar-content">
      <img src="https://i.ibb.co/YF0MfYXS/Logo-RBT-Perfil.jpg" class="logo">
      <span class="titulo">Monitoramento - Metas equipes externa</span>
    </div>
  </div>

  <div class="card">
    <input type="file" id="upload" />
  </div>

  <div class="card">
    <table id="tabela">
      <thead>
        <tr>
          <th>
            <div style="display:flex; align-items:center; gap:10px;">
              <span>Técnico</span>
              <button onclick="abrirFiltro()" class="btn" style="margin:0; padding:4px 8px; font-size:12px; background:#dc2626; color:white;">Filtrar</button>
            </div>
          </th>

          <th>
            <div class="th-mes">
              Jan <button class="btn-sort" onclick="ordenarMes(0, this)">↓</button>
            </div>
          </th>

          <th>
            <div class="th-mes">
              Fev <button class="btn-sort" onclick="ordenarMes(1, this)">↓</button>
            </div>
          </th>

          <th>
            <div class="th-mes">
              Mar <button class="btn-sort" onclick="ordenarMes(2, this)">↓</button>
            </div>
          </th>

          <th>
            <div class="th-mes">
              Média <button class="btn-sort" onclick="ordenarMedia(this)">↓</button>
            </div>
          </th>

          <th>Status</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

</div>

<div id="modalFiltro" class="modal">
  <div class="modal-content">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
      <h3 style="margin:0;">Filtrar Técnicos</h3>
      <div>
        <button class="btn btn-aplicar" onclick="aplicarFiltro()">Aplicar</button>
        <button class="btn btn-limpar" onclick="limparFiltro()">Limpar</button>
      </div>
    </div>

    <div id="listaNomes"></div>
  </div>
</div>

<script>
let dadosTecnicos = {};
let nomesFiltrados = [];

let tipoOrdenacao = null;
let direcao = "desc";

document.getElementById('upload').addEventListener('change', handleFile);

function handleFile(e) {
  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = function(e) {
    const data = new Uint8Array(e.target.result);
    const workbook = XLSX.read(data, {type: 'array'});

    dadosTecnicos = {};

    workbook.SheetNames.forEach((nomeAba, index) => {
      const sheet = workbook.Sheets[nomeAba];
      const rows = XLSX.utils.sheet_to_json(sheet, {header: 1});

      rows.forEach((row, i) => {
        if (i === 0) return;

        const nome = row[0];
        const total = row[19];

        if (!nome) return;

        if (!dadosTecnicos[nome]) {
          dadosTecnicos[nome] = [0, 0, 0];
        }

        dadosTecnicos[nome][index] = Number(total) || 0;
      });
    });

    renderTabela();
  };

  reader.readAsArrayBuffer(file);
}

function renderTabela() {
  let tbody = document.querySelector("#tabela tbody");
  tbody.innerHTML = "";

  let lista = Object.keys(dadosTecnicos);

  if (tipoOrdenacao !== null) {
    lista.sort((a, b) => {

      let valA, valB;

      if (tipoOrdenacao === "media") {
        valA = dadosTecnicos[a].reduce((x,y)=>x+y,0)/3;
        valB = dadosTecnicos[b].reduce((x,y)=>x+y,0)/3;
      } else {
        valA = dadosTecnicos[a][tipoOrdenacao];
        valB = dadosTecnicos[b][tipoOrdenacao];
      }

      return direcao === "desc" ? valB - valA : valA - valB;
    });
  }

  lista.forEach(nome => {

    if (nomesFiltrados.length > 0 && !nomesFiltrados.includes(nome)) return;

    let meses = dadosTecnicos[nome];
    let media = meses.reduce((a, b) => a + b, 0) / meses.length;

    let linha = `<tr><td><strong>${nome}</strong></td>`;

    meses.forEach(valor => {
      let classe = valor >= 170 ? "meta-ok" : "meta-bad";
      linha += `<td class="${classe}">${valor}</td>`;
    });

    linha += `<td>${media.toFixed(1)}</td>`;

    const mesesLabel = ["JAN","FEV","MAR"];
    let status = "";

    meses.forEach((valor, i) => {
      status += `<span class="circulo ${valor >= 170 ? 'verde' : 'vermelho'}">${mesesLabel[i]}</span>`;
    });

    linha += `<td>${status}</td></tr>`;
    tbody.innerHTML += linha;
  });
}

function ordenarMes(index, botao) {
  if (tipoOrdenacao === index) {
    direcao = direcao === "desc" ? "asc" : "desc";
  } else {
    tipoOrdenacao = index;
    direcao = "desc";
  }

  atualizarIcones(botao);
  renderTabela();
}

function ordenarMedia(botao) {
  if (tipoOrdenacao === "media") {
    direcao = direcao === "desc" ? "asc" : "desc";
  } else {
    tipoOrdenacao = "media";
    direcao = "desc";
  }

  atualizarIcones(botao);
  renderTabela();
}

function atualizarIcones(botaoAtivo) {
  document.querySelectorAll(".btn-sort").forEach(btn => btn.textContent = "↓");
  botaoAtivo.textContent = direcao === "desc" ? "↓" : "↑";
}

function abrirFiltro() {
  const modal = document.getElementById("modalFiltro");
  const lista = document.getElementById("listaNomes");

  lista.innerHTML = "";

  Object.keys(dadosTecnicos).forEach(nome => {
    const checked = nomesFiltrados.includes(nome) ? "checked" : "";
    lista.innerHTML += `<div><input type="checkbox" value="${nome}" ${checked}> ${nome}</div>`;
  });

  modal.style.display = "flex";
}

function aplicarFiltro() {
  const checks = document.querySelectorAll("#listaNomes input:checked");
  nomesFiltrados = Array.from(checks).map(c => c.value);
  document.getElementById("modalFiltro").style.display = "none";
  renderTabela();
}

function limparFiltro() {
  nomesFiltrados = [];
  document.getElementById("modalFiltro").style.display = "none";
  renderTabela();
}
</script>

</body>
</html>

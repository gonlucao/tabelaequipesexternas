<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Monitoramento - Metas equipes externa</title>

  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #f5f7fb;
      margin: 0;
      padding: 20px;
      color: #333;
    }

    .topbar {
      background: linear-gradient(90deg, #b91c1c, #dc2626);
      padding: 25px 20px;
      border-radius: 12px;
      margin-bottom: 20px;
    }

    .topbar-content {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .logo {
      height: 60px;
      border-radius: 8px;
    }

    .titulo {
      color: white;
      font-size: 24px;
      font-weight: 700;
    }

    .container {
      max-width: 1200px;
      margin: auto;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 16px;
      margin-top: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid #eee;
      text-align: center;
    }

    th:first-child, td:first-child {
      text-align: left;
    }

    .meta-ok { color: green; }
    .meta-bad { color: red; }

    .circulo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      font-size: 11px;
      font-weight: 700;
      margin-right: 5px;
      color: white;
    }

    .verde { background: #16a34a; }
    .vermelho { background: #dc2626; }

    .th-mes {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .btn-sort {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: none;
      background: #e5e7eb;
      cursor: pointer;
      font-size: 12px;
      font-weight: bold;
    }

    .btn-sort:hover {
      background: #dc2626;
      color: white;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.4);
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background: white;
      padding: 20px;
      border-radius: 12px;
      width: 300px;
      max-height: 400px;
      overflow-y: auto;
    }

    .btn {
      padding: 6px 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 10px;
    }

    .btn-aplicar { background: #16a34a; color: white; }
    .btn-limpar { background: #dc2626; color: white; }
  </style>
</head>

<body>
<div class="container">

  <div class="topbar">
    <div class="topbar-content">
      <img src="https://i.ibb.co/YF0MfYXS/Logo-RBT-Perfil.jpg" class="logo">
      <span class="titulo">Monitoramento - Metas equipes externa</span>
    </div>
  </div>

  <div class="card">
    <input type="file" id="upload" />
  </div>

  <div class="card">
    <table id="tabela">
      <thead>
        <tr>
          <th>
            Técnico
            <button onclick="abrirFiltro()" class="btn" style="background:#dc2626;color:white;">Filtrar</button>
          </th>

          <th><div class="th-mes">Jan <button class="btn-sort" onclick="ordenarMes(0,this)">↓</button></div></th>
          <th><div class="th-mes">Fev <button class="btn-sort" onclick="ordenarMes(1,this)">↓</button></div></th>
          <th><div class="th-mes">Mar <button class="btn-sort" onclick="ordenarMes(2,this)">↓</button></div></th>

          <th><div class="th-mes">Média <button class="btn-sort" onclick="ordenarMedia(this)">↓</button></div></th>
          <th><div class="th-mes">Status <button class="btn-sort" onclick="ordenarStatus(this)">↓</button></div></th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

</div>

<!-- MODAL -->
<div id="modalFiltro" class="modal">
  <div class="modal-content">
    <h3>Filtrar Técnicos</h3>
    <div id="listaNomes"></div>
    <button class="btn btn-aplicar" onclick="aplicarFiltro()">Aplicar</button>
    <button class="btn btn-limpar" onclick="limparFiltro()">Limpar</button>
  </div>
</div>

<script>
let dadosTecnicos = {};
let nomesFiltrados = [];

let tipoOrdenacao = null;
let direcao = "desc";

document.getElementById('upload').addEventListener('change', handleFile);

function handleFile(e) {
  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = function(e) {
    const data = new Uint8Array(e.target.result);
    const workbook = XLSX.read(data, {type: 'array'});

    dadosTecnicos = {};

    workbook.SheetNames.forEach((nomeAba, index) => {
      const sheet = workbook.Sheets[nomeAba];
      const rows = XLSX.utils.sheet_to_json(sheet, {header: 1});

      rows.forEach((row, i) => {
        if (i === 0) return;

        const nome = row[0];
        const total = row[19];

        if (!nome) return;

        if (!dadosTecnicos[nome]) {
          dadosTecnicos[nome] = [0, 0, 0];
        }

        dadosTecnicos[nome][index] = Number(total) || 0;
      });
    });

    renderTabela();
  };

  reader.readAsArrayBuffer(file);
}

function media(arr){
  return arr.reduce((a,b)=>a+b,0)/arr.length;
}

function contarMetas(meses){
  return meses.filter(v => v >= 170).length;
}

function renderTabela() {
  let tbody = document.querySelector("#tabela tbody");
  tbody.innerHTML = "";

  let lista = Object.keys(dadosTecnicos);

  if (tipoOrdenacao !== null) {
    lista.sort((a, b) => {

      if (tipoOrdenacao === "media") {
        return direcao === "desc"
          ? media(dadosTecnicos[b]) - media(dadosTecnicos[a])
          : media(dadosTecnicos[a]) - media(dadosTecnicos[b]);
      }

      if (tipoOrdenacao === "status") {
        let metasA = contarMetas(dadosTecnicos[a]);
        let metasB = contarMetas(dadosTecnicos[b]);

        if (metasA !== metasB) {
          return direcao === "desc" ? metasB - metasA : metasA - metasB;
        }

        return direcao === "desc"
          ? media(dadosTecnicos[b]) - media(dadosTecnicos[a])
          : media(dadosTecnicos[a]) - media(dadosTecnicos[b]);
      }

      return direcao === "desc"
        ? dadosTecnicos[b][tipoOrdenacao] - dadosTecnicos[a][tipoOrdenacao]
        : dadosTecnicos[a][tipoOrdenacao] - dadosTecnicos[b][tipoOrdenacao];
    });
  }

  lista.forEach(nome => {

    let meses = dadosTecnicos[nome];
    let m = media(meses);

    if (m < 50) return; // ocultação automática

    if (nomesFiltrados.length > 0 && !nomesFiltrados.includes(nome)) return;

    let linha = `<tr><td><strong>${nome}</strong></td>`;

    meses.forEach(valor => {
      linha += `<td class="${valor >= 170 ? 'meta-ok' : 'meta-bad'}">${valor}</td>`;
    });

    linha += `<td>${m.toFixed(1)}</td>`;

    let status = "";
    ["JAN","FEV","MAR"].forEach((mes,i)=>{
      status += `<span class="circulo ${meses[i]>=170?'verde':'vermelho'}">${mes}</span>`;
    });

    linha += `<td>${status}</td></tr>`;
    tbody.innerHTML += linha;
  });
}

function ordenarMes(i,btn){
  if(tipoOrdenacao===i){direcao = direcao==="desc"?"asc":"desc";}
  else{tipoOrdenacao=i;direcao="desc";}
  atualizarIcones(btn); renderTabela();
}

function ordenarMedia(btn){
  if(tipoOrdenacao==="media"){direcao = direcao==="desc"?"asc":"desc";}
  else{tipoOrdenacao="media";direcao="desc";}
  atualizarIcones(btn); renderTabela();
}

function ordenarStatus(btn){
  if(tipoOrdenacao==="status"){direcao = direcao==="desc"?"asc":"desc";}
  else{tipoOrdenacao="status";direcao="desc";}
  atualizarIcones(btn); renderTabela();
}

function atualizarIcones(btn){
  document.querySelectorAll(".btn-sort").forEach(b=>b.textContent="↓");
  btn.textContent = direcao==="desc"?"↓":"↑";
}

// FILTRO NOME
function abrirFiltro(){
  let modal = document.getElementById("modalFiltro");
  let lista = document.getElementById("listaNomes");

  lista.innerHTML = "";

  Object.keys(dadosTecnicos).forEach(nome=>{
    lista.innerHTML += `<div><input type="checkbox" value="${nome}"> ${nome}</div>`;
  });

  modal.style.display = "flex";
}

function aplicarFiltro(){
  let checks = document.querySelectorAll("#listaNomes input:checked");
  nomesFiltrados = Array.from(checks).map(c=>c.value);
  document.getElementById("modalFiltro").style.display = "none";
  renderTabela();
}

function limparFiltro(){
  nomesFiltrados = [];
  document.getElementById("modalFiltro").style.display = "none";
  renderTabela();
}
</script>

</body>
</html>

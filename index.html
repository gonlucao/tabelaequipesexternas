<script>
let dadosTecnicos = {};
let nomesFiltrados = [];
let ordenacaoAtual = null;

document.getElementById('upload').addEventListener('change', handleFile);

function handleFile(e) {
  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = function(e) {
    const data = new Uint8Array(e.target.result);
    const workbook = XLSX.read(data, {type: 'array'});

    dadosTecnicos = {};

    workbook.SheetNames.forEach((nomeAba, index) => {
      const sheet = workbook.Sheets[nomeAba];
      const rows = XLSX.utils.sheet_to_json(sheet, {header: 1});

      rows.forEach((row, i) => {
        if (i === 0) return;

        const nome = row[0];
        const total = row[19];

        if (!nome) return;

        if (!dadosTecnicos[nome]) {
          dadosTecnicos[nome] = [0, 0, 0];
        }

        dadosTecnicos[nome][index] = Number(total) || 0;
      });
    });

    renderTabela();
  };

  reader.readAsArrayBuffer(file);
}

function getDadosOrdenados() {
  let lista = Object.keys(dadosTecnicos).map(nome => {
    let meses = dadosTecnicos[nome];
    let media = meses.reduce((a, b) => a + b, 0) / meses.length;
    let metasBatidas = meses.filter(v => v >= 170).length;

    return { nome, meses, media, metasBatidas };
  });

  if (ordenacaoAtual) {
    lista.sort(ordenacaoAtual);
  }

  return lista;
}

function renderTabela() {
  let tbody = document.querySelector("#tabela tbody");
  tbody.innerHTML = "";

  let lista = getDadosOrdenados();

  lista.forEach(item => {

    if (nomesFiltrados.length > 0 && !nomesFiltrados.includes(item.nome)) {
      return;
    }

    let linha = `<tr><td><strong>${item.nome}</strong></td>`;

    item.meses.forEach(valor => {
      let classe = valor >= 170 ? "meta-ok" : "meta-bad";
      linha += `<td class="${classe}">${valor}</td>`;
    });

    linha += `<td>${item.media.toFixed(1)}</td>`;

    const mesesLabel = ["JAN","FEV","MAR"];
    let status = "";

    item.meses.forEach((valor, i) => {
      if (valor >= 170) {
        status += `<span class="circulo verde">${mesesLabel[i]}</span>`;
      } else {
        status += `<span class="circulo vermelho">${mesesLabel[i]}</span>`;
      }
    });

    linha += `<td>${status}</td></tr>`;
    tbody.innerHTML += linha;
  });
}

function ordenarPorMes(index) {
  ordenacaoAtual = (a, b) => b.meses[index] - a.meses[index];
  renderTabela();
}

function ordenarPorMedia() {
  ordenacaoAtual = (a, b) => b.media - a.media;
  renderTabela();
}

function ordenarPorDesempenho() {
  ordenacaoAtual = (a, b) => {
    if (b.metasBatidas !== a.metasBatidas) {
      return b.metasBatidas - a.metasBatidas;
    }
    return b.media - a.media;
  };
  renderTabela();
}

function abrirFiltro() {
  const modal = document.getElementById("modalFiltro");
  const lista = document.getElementById("listaNomes");

  lista.innerHTML = "";

  Object.keys(dadosTecnicos).forEach(nome => {
    const checked = nomesFiltrados.includes(nome) ? "checked" : "";

    lista.innerHTML += `
      <div>
        <input type="checkbox" value="${nome}" ${checked}> ${nome}
      </div>
    `;
  });

  modal.style.display = "flex";
}

function aplicarFiltro() {
  const checks = document.querySelectorAll("#listaNomes input:checked");
  nomesFiltrados = Array.from(checks).map(c => c.value);

  document.getElementById("modalFiltro").style.display = "none";
  renderTabela();
}

function limparFiltro() {
  nomesFiltrados = [];
  document.getElementById("modalFiltro").style.display = "none";
  renderTabela();
}
</script>

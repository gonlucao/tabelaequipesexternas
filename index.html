<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Monitoramento - Metas equipes externa</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
/* (SEU CSS ORIGINAL MANTIDO 100%) */
body {
  font-family: 'Inter';
  background:#f5f7fb;
  padding:20px;
}

.login-overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:#00000090;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:999;
}

.login-box{
  background:white;
  padding:25px;
  border-radius:12px;
  width:320px;
  text-align:center;
}

.input-padrao{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:1px solid #ccc;
  box-sizing:border-box;
}

.btn-padrao{
  width:100%;
  padding:10px;
  margin-top:10px;
  background:#dc2626;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:600;
}

.btn-sec{
  background:#e5e7eb;
  color:#333;
}

.cadastro{
  display:none;
  margin-top:10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login-overlay" id="loginBox">
  <div class="login-box">
    <h3>Login</h3>

    <input class="input-padrao" type="text" id="user" placeholder="Usuário">
    <input class="input-padrao" type="password" id="pass" placeholder="Senha">

    <button class="btn-padrao" onclick="login()">Entrar</button>

    <button class="btn-padrao btn-sec" onclick="toggleCadastro()">Criar conta</button>

    <div class="cadastro" id="cadastroBox">
      <input class="input-padrao" type="text" id="newUser" placeholder="Novo usuário">
      <input class="input-padrao" type="password" id="newPass" placeholder="Senha">

      <select class="input-padrao" id="perfil">
        <option value="supervisor">Supervisor</option>
        <option value="equipe">Equipe</option>
      </select>

      <button class="btn-padrao" onclick="cadastrar()">Cadastrar</button>
    </div>

    <p id="erro" style="color:red;font-size:12px;"></p>
  </div>
</div>

<!-- ===================== -->
<!-- 🔥 SUA DASH ORIGINAL -->
<!-- COLE AQUI EXATAMENTE SUA DASH COMPLETA -->
<!-- ===================== -->

<script>

/* =========================
   🔐 LOGIN COM APPS SCRIPT
========================= */

const API_URL = "https://script.google.com/macros/s/AKfycbydC82xbEs7KD4MZcwxyxXX6ahBJKWN9QYKqZ_DV_OZH96EsG1JyyomJNjd3GpwWe2N/exec";

async function login(){

  let u = document.getElementById("user").value;
  let p = document.getElementById("pass").value;

  if(!u || !p){
    return erro("Preencha usuário e senha");
  }

  try {

    const res = await fetch(`${API_URL}?user=${encodeURIComponent(u)}&pass=${encodeURIComponent(p)}`);
    const text = await res.text();

    let data;

    try{
      data = JSON.parse(text);
    }catch{
      console.log("Resposta inválida:", text);
      return erro("Erro na resposta do servidor");
    }

    if(data.status){

      localStorage.setItem("logado", JSON.stringify(data));

      aplicarLogin(data);

    }else{
      erro("Usuário ou senha inválidos");
    }

  } catch(e){
    console.error(e);
    erro("Erro ao conectar com servidor");
  }
}

/* =========================
   👤 CONTROLE DE SESSÃO
========================= */

function aplicarLogin(user){
  document.getElementById("loginBox").style.display="none";

  // Se quiser depois:
  // mostrar nome no topo
}

function logout(){
  localStorage.removeItem("logado");
  location.reload();
}

function erro(msg){
  document.getElementById("erro").innerText = msg;
}

/* =========================
   🔁 AUTO LOGIN
========================= */

window.onload = () => {
  let logado = JSON.parse(localStorage.getItem("logado"));

  if(logado){
    aplicarLogin(logado);
  }
};

/* =========================
   📦 UI
========================= */

function toggleCadastro(){
  let box = document.getElementById("cadastroBox");
  box.style.display = box.style.display === "block" ? "none" : "block";
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Monitoramento - Metas equipes externa</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #f5f7fb;
      margin: 0;
      padding: 20px;
      color: #333;
    }

    .topbar {
      background: linear-gradient(90deg, #b91c1c, #dc2626);
      padding: 25px 20px;
      border-radius: 12px;
      margin-bottom: 20px;
    }

    .topbar-content {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .logo {
      height: 60px;
      border-radius: 8px;
    }

    .titulo {
      color: white;
      font-size: 24px;
      font-weight: 700;
    }

    .container {
      max-width: 1200px;
      margin: auto;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 16px;
      margin-top: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid #eee;
      text-align: center;
    }

    th:first-child, td:first-child {
      text-align: left;
    }

    .meta-ok { color: green; }
    .meta-bad { color: red; }

    .circulo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      font-size: 11px;
      font-weight: 700;
      margin-right: 5px;
      color: white;
    }

    .verde { background: #16a34a; }
    .vermelho { background: #dc2626; }
  </style>
</head>

<body>
<div class="container">

  <div class="topbar">
    <div class="topbar-content">
      <img src="https://i.ibb.co/YF0MfYXS/Logo-RBT-Perfil.jpg" class="logo">
      <span class="titulo">Monitoramento - Metas equipes externa</span>
    </div>
  </div>

  <div class="card">
    <table id="tabela">
      <thead>
        <tr>
          <th>Técnico</th>
          <th>Jan</th>
          <th>Fev</th>
          <th>Mar</th>
          <th>Média</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

</div>

<script>
let dadosTecnicos = {};

// IDs das abas (ordem: Jan, Fev, Mar)
const abas = [0, 1, 2];

async function carregarMes(gid){
  const url = `https://docs.google.com/spreadsheets/d/1KAmeD9jbBX8JssWWeWG3kR03J4zVEjQDx--ojQIFSmg/gviz/tq?tqx=out:json&gid=${gid}`;
  
  const res = await fetch(url);
  const text = await res.text();
  const json = JSON.parse(text.substr(47).slice(0, -2));

  return json.table.rows;
}

async function carregarDadosOnline(){
  dadosTecnicos = {};

  for(let i = 0; i < abas.length; i++){
    let rows = await carregarMes(abas[i]);

    rows.forEach((row, index) => {
      if(index === 0) return;

      const nome = row.c[0]?.v;
      const total = Number(row.c[19]?.v) || 0;

      if(!nome) return;

      if(!dadosTecnicos[nome]){
        dadosTecnicos[nome] = [0,0,0];
      }

      dadosTecnicos[nome][i] = total;
    });
  }

  renderTabela();
}

function media(arr){
  return arr.reduce((a,b)=>a+b,0)/arr.length;
}

function renderTabela() {
  let tbody = document.querySelector("#tabela tbody");
  tbody.innerHTML = "";

  Object.keys(dadosTecnicos).forEach(nome => {

    let meses = dadosTecnicos[nome];
    let m = media(meses);

    if (m < 50) return;

    let linha = `<tr><td><strong>${nome}</strong></td>`;

    meses.forEach(valor => {
      linha += `<td class="${valor >= 170 ? 'meta-ok' : 'meta-bad'}">${valor}</td>`;
    });

    linha += `<td>${m.toFixed(1)}</td>`;

    let status = "";
    ["JAN","FEV","MAR"].forEach((mes,i)=>{
      status += `<span class="circulo ${meses[i]>=170?'verde':'vermelho'}">${mes}</span>`;
    });

    linha += `<td>${status}</td></tr>`;
    tbody.innerHTML += linha;
  });
}

// carregar automático
carregarDadosOnline();
</script>

</body>
</html>

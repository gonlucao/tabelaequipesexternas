<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Monitoramento - Metas equipes externa</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Inter';
  background:#f5f7fb;
  padding:20px;
}

/* LOGIN */
.login-overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:#00000090;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:999;
}

.login-box{
  background:white;
  padding:30px 25px;
  border-radius:14px;
  width:320px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.login-box input{
  width:100%;
  padding:12px;
  margin-top:12px;
  border-radius:10px;
  border:1px solid #ccc;
  box-sizing:border-box;
  font-size:14px;
}

.login-box button{
  width:100%;
  padding:12px;
  margin-top:12px;
  border-radius:10px;
  border:none;
  background:#dc2626;
  color:white;
  font-weight:600;
  cursor:pointer;
  transition:0.2s;
}

.login-box button:hover{
  background:#b91c1c;
}

/* USER BAR */
.user-bar{
  display:flex;
  justify-content:flex-end;
  gap:10px;
  margin-bottom:10px;
}

.user-bar button{
  background:#dc2626;
  color:white;
  border:none;
  padding:6px 10px;
  border-radius:6px;
  cursor:pointer;
}

.container { max-width:1200px; margin:auto; }

/* MENU */
.menu { display:flex; gap:10px; margin-bottom:15px; }

.menu button{
  padding:10px 18px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:#e5e7eb;
  font-weight:600;
}

.menu button.ativo{
  background:#dc2626;
  color:white;
}

/* PAGINAS */
.pagina { display:none; }
.pagina.ativa { display:block; }

.topbar {
  background: linear-gradient(90deg,#b91c1c,#dc2626);
  padding:15px;
  border-radius:12px;
  color:white;
}

.topbar-content {
  display:flex;
  align-items:center;
  gap:12px;
}

.logo { height:45px; }

/* KPIs */
.cards {
  display:grid;
  grid-template-columns: repeat(3,1fr);
  gap:15px;
  margin-top:20px;
}

.card-kpi {
  background:white;
  padding:20px;
  border-radius:12px;
  text-align:center;
  box-shadow:0 4px 10px #0001;
}

.card-kpi span {
  font-size:32px;
  font-weight:bold;
}

/* META */
.meta-grid {
  display:grid;
  grid-template-columns: repeat(3,1fr);
  gap:12px;
  margin-top:12px;
}

.meta-box {
  padding:18px;
  border-radius:14px;
  color:white;
  text-align:center;
}

.meta-box strong {
  font-size:30px;
  display:block;
}

.meta3 { background:#16a34a; }
.meta2 { background:#f59e0b; }
.meta1 { background:#dc2626; }

/* TOP 3 */
.top3 { display:flex; gap:15px; margin-top:20px; }

.top3-card {
  flex:1;
  background:white;
  padding:15px;
  border-radius:12px;
  text-align:center;
  box-shadow:0 4px 10px #0001;
}

/* TABLE */
.card {
  background:white;
  padding:20px;
  border-radius:16px;
  margin-top:20px;
}

table { width:100%; border-collapse:collapse; }

th,td {
  padding:10px;
  border-bottom:1px solid #eee;
  text-align:center;
}

th:first-child,td:first-child { text-align:left; }

tr:hover { background:#f9fafb; }

.meta-ok{color:#16a34a;font-weight:bold;}
.meta-bad{color:#dc2626;}

.circulo{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  width:28px;
  height:28px;
  border-radius:50%;
  font-size:9px;
  color:white;
  margin-right:3px;
}

.verde{background:#16a34a;}
.vermelho{background:#dc2626;}

.btn-sort {
  cursor:pointer;
  margin-left:6px;
  font-size:12px;
  color:#555;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login-overlay" id="loginBox">
  <div class="login-box">
    <h3>Login</h3>

    <input type="text" id="user" placeholder="Usuário">
    <input type="password" id="pass" placeholder="Senha">

    <button onclick="login()">Entrar</button>

    <p id="erro" style="color:red;font-size:12px;"></p>
  </div>
</div>

<div class="container">

<div class="user-bar">
  <span id="usuarioLogado"></span>
  <button onclick="logout()">Sair</button>
</div>

<div class="menu" id="menu">
  <button onclick="trocarPagina(0)">Dashboard</button>
  <button onclick="trocarPagina(1)">Metas equipes</button>
</div>

<!-- DASHBOARD -->
<div class="pagina ativa" id="p1">

<div class="topbar">
  <div class="topbar-content">
    <img src="https://i.ibb.co/rjpBZ8P/Logo-RBT-Perfil.jpg" class="logo">
    <span>Monitoramento - Metas equipes externa</span>
  </div>
</div>

<!-- RESTANTE DA DASH SEGUE IGUAL (SEM ALTERAÇÃO) -->
